name: Release

# CI validates every push. A published release only builds and publishes the
# already-validated image for each supported architecture.
on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-amd64:
    name: Build & Push AMD64
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push AMD64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/reverb:build-${{ github.sha }}-amd64
          cache-from: type=gha,scope=reverb-amd64
          cache-to: type=gha,scope=reverb-amd64,mode=max
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
          provenance: true

  build-arm64:
    name: Build & Push ARM64
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ARM64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/reverb:build-${{ github.sha }}-arm64
          cache-from: type=gha,scope=reverb-arm64
          cache-to: type=gha,scope=reverb-arm64,mode=max
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
          provenance: true

  publish-manifest:
    name: Publish multi-arch image
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish image manifest
        run: |
          tag=${{ github.event.release.tag_name }}
          version=${tag#v}
          docker buildx imagetools create \
            -t "ghcr.io/${{ github.repository_owner }}/reverb:${version}" \
            -t "ghcr.io/${{ github.repository_owner }}/reverb:latest" \
            "ghcr.io/${{ github.repository_owner }}/reverb@${{ needs.build-amd64.outputs.digest }}" \
            "ghcr.io/${{ github.repository_owner }}/reverb@${{ needs.build-arm64.outputs.digest }}"
      - name: Attach notes to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true

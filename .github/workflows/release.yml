name: Release

# A release may publish only the current main commit after its CI workflow has
# succeeded. This prevents an arbitrary tag or a commit with failed CI from
# becoming a public image.
on:
  release:
    types: [published]

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  verify-release:
    name: Verify release source
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - id: source
        name: Require the release tag to match main
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          tag_sha="$(git rev-parse "${TAG}^{commit}")"
          main_sha="$(git rev-parse origin/main)"
          test "$tag_sha" = "$main_sha"
          echo "sha=$tag_sha" >> "$GITHUB_OUTPUT"
      - name: Require successful CI for the release commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.source.outputs.sha }}
        run: |
          successful_runs="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --commit "$SHA" \
            --status completed \
            --json conclusion \
            --jq '[.[] | select(.conclusion == "success")] | length')"
          test "$successful_runs" -gt 0

  build-amd64:
    name: Build & Push AMD64
    needs: verify-release
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-release.outputs.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push AMD64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/reverb:build-${{ github.sha }}-amd64
          cache-from: type=gha,scope=reverb-amd64
          cache-to: type=gha,scope=reverb-amd64,mode=max
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            YTDLP_BUILD_STAMP=${{ github.run_id }}
          provenance: true

  build-arm64:
    name: Build & Push ARM64
    needs: verify-release
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-release.outputs.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ARM64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/reverb:build-${{ github.sha }}-arm64
          cache-from: type=gha,scope=reverb-arm64
          cache-to: type=gha,scope=reverb-arm64,mode=max
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            YTDLP_BUILD_STAMP=${{ github.run_id }}
          provenance: true

  publish-manifest:
    name: Publish multi-arch image
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish image manifest
        run: |
          tag=${{ github.event.release.tag_name }}
          version=${tag#v}
          docker buildx imagetools create \
            -t "ghcr.io/${{ github.repository_owner }}/reverb:${version}" \
            -t "ghcr.io/${{ github.repository_owner }}/reverb:latest" \
            "ghcr.io/${{ github.repository_owner }}/reverb@${{ needs.build-amd64.outputs.digest }}" \
            "ghcr.io/${{ github.repository_owner }}/reverb@${{ needs.build-arm64.outputs.digest }}"
      - name: Attach notes to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true

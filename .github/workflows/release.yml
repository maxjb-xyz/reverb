name: Release
# Triggers when a GitHub Release is published (via the GitHub UI or API).
# To fire this for the first time: publish a GitHub Release named "v0.1.0".
# Intended GHCR owner: maxjb-xyz (resolved at runtime via github.repository_owner).
on:
  release:
    types: [published]
permissions:
  contents: write
  packages: write
jobs:
  # Gate the publish on the same checks CI runs, so a release can never ship an
  # image whose tests fail. Mirrors the backend + frontend jobs in ci.yml.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go vet ./cmd/... ./internal/...
      - run: go test ./cmd/... ./internal/... -race -count=1
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Frontend build + tests
        working-directory: web
        run: |
          npm ci
          npx tsc --noEmit
          npm run test
          npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from release tag
        id: ver
        run: |
          TAG=${{ github.event.release.tag_name }}
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      # QEMU lets buildx cross-build the arm64 image on an amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/reverb:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/reverb:latest
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          provenance: true
      - name: Attach notes to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Pass the tag explicitly: recent v2.x no longer reliably infers it from
          # the release event, failing with "GitHub Releases requires a tag".
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true

name: Release
# Triggers when a GitHub Release is published (via the GitHub UI or API).
# To fire this for the first time: publish a GitHub Release named "v0.1.0".
# Intended GHCR owner: maxjb-xyz (resolved at runtime via github.repository_owner).
on:
  release:
    types: [published]
permissions:
  contents: write
  packages: write
jobs:
  # Gate the publish on every CI check so a release can never ship an image whose
  # source or browser-level checks failed.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.5' }
      - run: go vet ./cmd/... ./internal/...
      - run: go test -race ./cmd/... ./internal/... -count=1
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./cmd/... ./internal/...
      - name: Check reachable Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Frontend build + tests
        working-directory: web
        run: |
          npm ci
          npx tsc --noEmit
          npm run lint
          npm run test
          npm run build
          npx playwright install --with-deps chromium
          npm run e2e

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: reverb:release-check
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
      - name: Smoke-test the image
        run: |
          docker run -d --name reverb-release-check -p 18090:8090 reverb:release-check --db /tmp/release-check.db
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:18090/api/v1/version; then ok=1; break; fi
            sleep 1
          done
          docker logs reverb-release-check
          test "${ok:-0}" = "1"
          docker rm -f reverb-release-check

  release:
    needs: [test, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from release tag
        id: ver
        run: |
          TAG=${{ github.event.release.tag_name }}
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      # QEMU lets buildx cross-build the arm64 image on an amd64 runner.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/reverb:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/reverb:latest
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          provenance: true
      - name: Attach notes to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Pass the tag explicitly: recent v2.x no longer reliably infers it from
          # the release event, failing with "GitHub Releases requires a tag".
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true

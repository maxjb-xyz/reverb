name: CI
on:
  push:
    branches: [main]
  pull_request:
env:
  GOVULNCHECK_VERSION: v1.6.0
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.5', cache: true }
      - run: go vet ./cmd/... ./internal/...
      - run: go test -race ./cmd/... ./internal/... -count=1
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.5', cache: true }
      - name: Cache golangci-lint
        id: golangci-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: ${{ runner.os }}-golangci-lint-v2.12.2
      - name: golangci-lint
        run: |
          if [ "${{ steps.golangci-cache.outputs.cache-hit }}" != "true" ]; then
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          fi
          golangci-lint run ./cmd/... ./internal/...
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.5', cache: true }
      - name: Cache govulncheck
        id: govulncheck-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: ${{ runner.os }}-govulncheck-${{ env.GOVULNCHECK_VERSION }}
      - name: Install govulncheck
        if: steps.govulncheck-cache.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
      - run: govulncheck ./...
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test
      - run: npm run build
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: reverb:ci
          # Reuse dependency, web-build, Go-build, and runtime-image layers
          # across push and pull-request checks.
          cache-from: type=gha,scope=reverb-image
          cache-to: type=gha,mode=max,scope=reverb-image
          build-args: |
            VERSION=${{ github.sha }}
      - name: Smoke-test the image
        run: |
          docker run -d --name reverb-ci -p 18090:8090 reverb:ci --db /tmp/ci.db
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:18090/api/v1/version; then ok=1; break; fi
            sleep 1
          done
          docker logs reverb-ci
          test "${ok:-0}" = "1"
          curl -fsS http://localhost:18090/api/v1/version | grep "${GITHUB_SHA}"
          docker rm -f reverb-ci
  e2e:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

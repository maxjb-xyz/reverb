name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go vet ./cmd/... ./internal/...
      # NOTE: -race is intentionally omitted. It doesn't flag any real data race
      # here (the download-manager state is lock-guarded), but its slowdown
      # exposes pre-existing timing assumptions in a couple of async manager tests
      # (they assert immediately after dispatching worker/scan work). Re-enable
      # once those tests use condition-based waiting instead of reading state
      # straight after triggering async work.
      - run: go test ./cmd/... ./internal/... -count=1
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./cmd/... ./internal/...
  govulncheck:
    runs-on: ubuntu-latest
    # Informational: the Go stdlib always has some open advisory, so this must not
    # block merges. It gives maintainers visibility into newly-disclosed CVEs that
    # the code actually calls; act on findings by bumping the toolchain/deps.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test
      - run: npm run build
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: reverb:ci
          build-args: |
            VERSION=${{ github.sha }}
      - name: Smoke-test the image
        run: |
          docker run -d --name reverb-ci -p 18090:8090 reverb:ci --db /tmp/ci.db
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:18090/api/v1/version; then ok=1; break; fi
            sleep 1
          done
          docker logs reverb-ci
          test "${ok:-0}" = "1"
          curl -fsS http://localhost:18090/api/v1/version | grep "${GITHUB_SHA}"
          docker rm -f reverb-ci
  e2e:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

# Production-ish single-host deployment for Reverb.
#
# Reverb writes downloads (via spotDL) into the shared /music volume. Point your
# Subsonic/Navidrome library adapter at the SAME music so downloads appear in the
# library after a scan. See the commented `navidrome` service below for a ready
# pairing. Secrets come ONLY from .env (copy .env.example -> .env).

services:
  reverb:
    # Pull the published image (override the tag with REVERB_VERSION, e.g. 0.1.0).
    image: ghcr.io/maxjb-xyz/reverb:${REVERB_VERSION:-latest}
    # To build from source instead, comment out `image:` above and uncomment:
    # build:
    #   context: .
    #   args:
    #     VERSION: "${REVERB_VERSION:-dev}"
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      # App state + SQLite DB. A named volume needs zero setup — it inherits the
      # container's non-root (uid 1000) ownership so the DB just opens.
      - reverb-data:/data
      # Your music library on the host. spotDL downloads land here and your
      # library server scans it. To use an EXISTING library, change ./music to its
      # path, e.g. `- /srv/music:/music`. Reverb runs as uid 1000, so this folder
      # must be writable by uid 1000 (it is if you created/own it). If it's owned
      # by a different user, add a `user: "<uid>:<gid>"` line to this service.
      - ./music:/music
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: a Navidrome that scans the SAME music dir. Uncomment to run the
  # full pairing. In Reverb's Settings UI add a Subsonic library adapter with
  # base URL http://navidrome:4533 (and REVERB_LIBRARY_PASSWORD in .env).
  # ---------------------------------------------------------------------------
  # navidrome:
  #   image: deluan/navidrome:latest
  #   ports:
  #     - "4533:4533"
  #   environment:
  #     ND_LOGLEVEL: info
  #   volumes:
  #     - ./music:/music:ro
  #     - ./navidrome-data:/data
  #   restart: unless-stopped

volumes:
  reverb-data:

# Production-ish single-host deployment for Reverb.
#
# Reverb writes downloads (via spotDL) into the shared /music volume. Point your
# Subsonic/Navidrome library adapter at the SAME music so downloads appear in the
# library after a scan. See the commented `navidrome` service below for a ready
# pairing. Secrets come ONLY from .env (copy .env.example -> .env).

services:
  reverb:
    # Pull the published image (override the tag with REVERB_VERSION, e.g. 0.1.0).
    image: ghcr.io/maxjb-xyz/reverb:${REVERB_VERSION:-latest}
    # To build from source instead, comment out `image:` above and uncomment:
    # build:
    #   context: .
    #   args:
    #     VERSION: "${REVERB_VERSION:-dev}"
    environment:
      # Run Reverb as the host user/group that owns the folders below, so the DB
      # is writable and downloads land on your filesystem with the right owner.
      # Set these to your `id -u` / `id -g` (defaults to 1000:1000).
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      # App state + SQLite DB on the host (handy for backups). The entrypoint
      # chowns /data to PUID:PGID on start, so this works even if Docker created
      # ./data as root.
      - ./data:/data
      # Your music library on the host — this is where spotDL downloads land and
      # where your library server scans. Point MUSIC_DIR at an existing library
      # (e.g. /srv/music or a NAS mount) in .env; it must be owned by / writable
      # by PUID:PGID. In Reverb's Settings, set the spotDL adapter's `output_dir`
      # to /music. Defaults to ./music next to this file.
      - ${MUSIC_DIR:-./music}:/music
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: a Navidrome that scans the SAME music dir. Uncomment to run the
  # full pairing. In Reverb's Settings UI add a Subsonic library adapter with
  # base URL http://navidrome:4533 (and REVERB_LIBRARY_PASSWORD in .env).
  # ---------------------------------------------------------------------------
  # navidrome:
  #   image: deluan/navidrome:latest
  #   ports:
  #     - "4533:4533"
  #   environment:
  #     ND_LOGLEVEL: info
  #   volumes:
  #     - ${MUSIC_DIR:-./music}:/music:ro
  #     - ./navidrome-data:/data
  #   restart: unless-stopped

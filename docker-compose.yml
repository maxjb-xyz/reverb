# Start with: docker compose up -d
#
# Reverb stores its database in a managed Docker volume and uses ./music for
# downloads. Optional settings live in .env; copy .env.example
# only when you need an existing music folder, a version pin, or credentials.

services:
  reverb:
    image: ghcr.io/maxjb-xyz/reverb:${REVERB_VERSION:-latest}
    ports:
      - "8090:8090"
    environment:
      REVERB_ADMIN_PASSWORD: ${REVERB_ADMIN_PASSWORD:-}
      REVERB_SPOTIFY_CLIENT_ID: ${REVERB_SPOTIFY_CLIENT_ID:-}
      REVERB_SPOTIFY_CLIENT_SECRET: ${REVERB_SPOTIFY_CLIENT_SECRET:-}
      REVERB_LIBRARY_PASSWORD: ${REVERB_LIBRARY_PASSWORD:-}
      REVERB_NAVIDROME_LISTEN_ADDRESS: ${REVERB_NAVIDROME_LISTEN_ADDRESS:-}
    volumes:
      - reverb-data:/data
      - "${REVERB_MUSIC_DIR:-./music}:/music"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  reverb-data:
